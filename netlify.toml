[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# פונקציה מתוזמנת — שליחת בקשות חשבוניות (רצה כל יום ב-07:00 UTC, בודקת בפנים אם היום הוא יום השליחה)
[functions."scheduled-invoice-send"]
  schedule = "0 7 * * *"

# פונקציה מתוזמנת — תזכורות לספקים שלא ענו (רצה כל יום ב-09:00 UTC)
[functions."scheduled-followup"]
  schedule = "0 9 * * *"
