<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>סקיצה 2 — שוק חם</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Rubik:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background: #1a0808;
    font-family: 'Rubik', sans-serif;
    direction: rtl;
    display: flex;
    justify-content: center;
  }
  .sheet {
    width: 640px;
    background: #F4E6CC;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .tile-border {
    height: 18px;
    background-image: repeating-linear-gradient(
      45deg,
      #802020 0 14px,
      #C8963F 14px 28px,
      #556B2F 28px 42px,
      #C8963F 42px 56px
    );
  }
  .content {
    padding: 28px 30px 24px;
    position: relative;
  }
  .hero {
    background: #802020;
    margin: -8px -18px 0;
    padding: 24px 24px 22px;
    color: #F4E6CC;
    position: relative;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 94%, 0 100%);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 8px; right: 8px; bottom: 8px; left: 8px;
    border: 1.5px dashed rgba(244,230,204,0.35);
    pointer-events: none;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 94%, 0 100%);
  }
  .hero-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .stamp {
    width: 82px;
    height: 82px;
    background: #F4E6CC;
    color: #802020;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Suez One', serif;
    font-size: 44px;
    line-height: 1;
    border: 3px solid #C8963F;
    box-shadow: inset 0 0 0 2px #F4E6CC, 0 4px 12px rgba(0,0,0,0.25);
  }
  .brand-title {
    font-family: 'Suez One', serif;
    font-size: 38px;
    line-height: 1;
  }
  .brand-subtitle {
    font-family: 'Rubik', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 3px;
    opacity: 0.8;
    margin-top: 6px;
    text-transform: uppercase;
  }
  .date-chip {
    background: #C8963F;
    color: #2A1410;
    padding: 8px 14px;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 1px;
    display: inline-block;
  }
  .supplier-card {
    background: #FFFFFF;
    margin: 22px 0 0;
    padding: 18px 20px;
    border: 3px solid #802020;
    position: relative;
  }
  .supplier-card::before,
  .supplier-card::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border: 3px solid #C8963F;
    background: #F4E6CC;
  }
  .supplier-card::before { top: -10px; right: -10px; transform: rotate(45deg); }
  .supplier-card::after  { bottom: -10px; left: -10px;  transform: rotate(45deg); }
  .supplier-label {
    font-family: 'Rubik', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    font-weight: 800;
    color: #556B2F;
    text-transform: uppercase;
  }
  .supplier-name {
    font-family: 'Suez One', serif;
    font-size: 32px;
    color: #802020;
    line-height: 1;
    margin-top: 4px;
  }
  .note {
    margin-top: 18px;
    background: #FFF4D6;
    border: 2px solid #C8963F;
    padding: 14px 16px;
    position: relative;
  }
  .note-flag {
    position: absolute;
    top: -10px;
    right: 14px;
    background: #C8963F;
    color: #2A1410;
    padding: 2px 10px;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .note-text {
    font-family: 'Rubik', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #2A1410;
    line-height: 1.5;
  }
  .branch {
    margin-top: 22px;
    background: #FFFFFF;
    border: 2px solid #2A1410;
    overflow: hidden;
  }
  .branch-bar {
    background: #556B2F;
    color: #F4E6CC;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .branch-bar-name {
    font-family: 'Suez One', serif;
    font-size: 20px;
  }
  .branch-bar-badge {
    background: #F4E6CC;
    color: #556B2F;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: #F4E6CC;
    font-family: 'Rubik', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #556B2F;
    padding: 8px 14px;
    text-align: right;
    text-transform: uppercase;
    border-bottom: 2px solid #C8963F;
  }
  th.qty { text-align: center; width: 90px; }
  td {
    font-family: 'Rubik', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #2A1410;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(42,20,16,0.1);
  }
  td.qty {
    text-align: center;
    font-family: 'Suez One', serif;
    font-size: 22px;
    color: #802020;
  }
  tr:nth-child(even) td { background: #FFF9EE; }
  .footer {
    margin-top: 26px;
    text-align: center;
    padding: 14px;
    background: #2A1410;
    color: #F4E6CC;
  }
  .footer-label {
    font-size: 11px;
    letter-spacing: 4px;
    font-weight: 800;
    color: #C8963F;
    text-transform: uppercase;
  }
  .footer-phone {
    font-family: 'Suez One', serif;
    font-size: 24px;
    direction: ltr;
    display: inline-block;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="sheet">
  <div class="tile-border"></div>
  <div class="content">
    <div class="hero">
      <div class="hero-inner">
        <div style="display:flex;align-items:center;gap:16px;">
          <div class="stamp">מ</div>
          <div>
            <div class="brand-title">משאוושה</div>
            <div class="brand-subtitle">Hummusiyot · Since 2020</div>
          </div>
        </div>
        <div class="date-chip">15 · אפריל · 2026</div>
      </div>
    </div>

    <div class="supplier-card">
      <div class="supplier-label">הזמנה לספק</div>
      <div class="supplier-name">יבולי שדה תמרה</div>
    </div>

    <div class="note">
      <div class="note-flag">⚡ הודעה חשובה</div>
      <div class="note-text">נא לוודא טריות העגבניות, חסר מלפפון מהמשלוח הקודם.</div>
    </div>

    <div class="branch">
      <div class="branch-bar">
        <div class="branch-bar-name">נהריה — מרכזי</div>
        <div class="branch-bar-badge">4 פריטים</div>
      </div>
      <table>
        <thead><tr><th>מוצר</th><th class="qty">כמות</th></tr></thead>
        <tbody>
          <tr><td>עגבנייה</td><td class="qty">12</td></tr>
          <tr><td>מלפפון</td><td class="qty">8</td></tr>
          <tr><td>בצל סגול</td><td class="qty">5</td></tr>
          <tr><td>פטרוזיליה</td><td class="qty">3</td></tr>
        </tbody>
      </table>
    </div>

    <div class="branch">
      <div class="branch-bar">
        <div class="branch-bar-name">קריית ביאליק</div>
        <div class="branch-bar-badge">3 פריטים</div>
      </div>
      <table>
        <thead><tr><th>מוצר</th><th class="qty">כמות</th></tr></thead>
        <tbody>
          <tr><td>עגבנייה</td><td class="qty">10</td></tr>
          <tr><td>שמן זית</td><td class="qty">6</td></tr>
          <tr><td>לימון</td><td class="qty">4</td></tr>
        </tbody>
      </table>
    </div>

    <div class="footer">
      <div class="footer-label">· לבירורים ·</div>
      <div class="footer-phone">052-123-4567</div>
    </div>
  </div>
  <div class="tile-border"></div>
</div>
</body>
</html>
