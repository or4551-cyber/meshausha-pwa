openapi: 3.1.0
info:
  title: Meshausha Price Catalog API
  description: 'מקור-האמת המרכזי למחירוני ספקי רשת משאוושה. ה-GPT הפרטי קורא מחירים חיים, מציע שינויים, ומבצע עדכון רק אחרי אישור מפורש של המשתמש (preview ואז apply). כל שינוי מגורסן והפיך. מחירים לפני מע"מ.'
  version: "1.0.0"
servers:
  - url: https://meshaushapp.netlify.app
    description: Production
security:
  - GptApiKey: []
paths:
  /api/prices/catalog/version:
    get:
      operationId: getCatalogVersion
      summary: גרסת הקטלוג הפעילה
      description: מחזיר את מספר הגרסה הפעילה (version) + checksum. השתמש ב-version כ-baseVersion ל-preview.
      responses:
        "200":
          description: הגרסה הפעילה
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: integer }
                  checksum: { type: string }
                  createdAt: { type: string, format: date-time }

  /api/prices/suppliers:
    get:
      operationId: listSuppliers
      summary: רשימת הספקים
      description: כל הספקים הפעילים בקטלוג (id + שם). שמור id לשימוש בחיפוש מוצרים לפי ספק.
      responses:
        "200":
          description: ספקים
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: integer }
                  suppliers:
                    type: array
                    items: { $ref: "#/components/schemas/Supplier" }

  /api/prices/products:
    get:
      operationId: searchProducts
      summary: חיפוש מוצרים
      description: 'חיפוש מוצרים לפי טקסט חופשי (q), ספק (supplierId) או קטגוריה (category), עם עימוד (limit מקס 200, offset). אם יש כמה התאמות — הצג למשתמש ובקש לבחור, אל תנחש.'
      parameters:
        - name: q
          in: query
          description: טקסט חיפוש (שם מוצר, מנורמל אוטומטית)
          schema: { type: string }
        - name: supplierId
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: includeInactive
          in: query
          description: כלול מוצרים מושבתים (ברירת מחדל false)
          schema: { type: boolean }
      responses:
        "200":
          description: תוצאות חיפוש
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: integer }
                  total: { type: integer }
                  offset: { type: integer }
                  products:
                    type: array
                    items: { $ref: "#/components/schemas/Product" }

  /api/prices/products/{id}:
    get:
      operationId: getProduct
      summary: מוצר יחיד
      description: המוצר והמחיר הפעיל לפי id.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: מוצר
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "404":
          description: לא נמצא

  /api/prices/products/{id}/history:
    get:
      operationId: getProductHistory
      summary: היסטוריית מחיר
      description: היסטוריית שינויי המחיר של המוצר לאורך גרסאות (מחיר אריזה, כמות, מחיר ליחידה).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: היסטוריה
          content:
            application/json:
              schema:
                type: object
                properties:
                  productId: { type: string }
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        version: { type: integer }
                        packagePrice: { type: number }
                        packageQuantity: { type: number }
                        unitPrice: { type: number }
                        createdAt: { type: string, format: date-time }

  /api/prices/changes/preview:
    post:
      operationId: previewChanges
      summary: תצוגה מקדימה של שינוי (לא שומר)
      description: 'יוצר טיוטת שינוי (ChangeSet) מול baseVersion — לא שומר. מחזיר id, warnings (שינוי חריג מעל 20%) וסיכום הפעולות. baseVersion מ-getCatalogVersion. אם חזר 409 stale_version — קרא version שוב ועשה preview מחדש. השתמש ב-id ל-apply.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseVersion, operations]
              properties:
                baseVersion:
                  type: integer
                  description: גרסת הבסיס (מ-getCatalogVersion)
                operations:
                  type: array
                  minItems: 1
                  items: { $ref: "#/components/schemas/ChangeOperation" }
      responses:
        "201":
          description: ChangeSet שנוצר (טיוטה, לא שמור עדיין)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChangeSet" }
        "409":
          description: התנגשות גרסה (stale_version) — קרא version שוב ועשה preview מחדש

  /api/prices/changes/{id}/apply:
    post:
      operationId: applyChange
      summary: אישור וביצוע שינוי (כותב גרסה חדשה)
      description: 'מבצע ChangeSet שנוצר ב-preview (פעולה בעלת השפעה). קרא רק אחרי אישור מפורש של המשתמש בשיחה. גוף הבקשה: confirmation="APPROVE". כותרת Idempotency-Key חובה — ערך ייחודי חד-פעמי לכל apply. מחזיר את הגרסה החדשה.'
      x-openai-isConsequential: true
      parameters:
        - name: id
          in: path
          required: true
          description: ה-id של ה-ChangeSet שחזר מ-preview
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          description: ערך ייחודי חד-פעמי לפעולה הזו (מחרוזת אקראית/UUID)
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation]
              properties:
                confirmation:
                  type: string
                  enum: ["APPROVE"]
                  description: חייב להיות בדיוק APPROVE — אישור מפורש לביצוע
      responses:
        "200":
          description: בוצע — מטא-נתוני הגרסה החדשה + המוצרים שהשתנו
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApplyResult" }
        "409":
          description: התנגשות/כבר-טופל (stale_version / version_conflict / not_pending)
        "410":
          description: ההצעה פגה — צור preview חדש

  /api/prices/changes/{id}/revert-preview:
    post:
      operationId: revertPreview
      summary: תצוגה מקדימה של ביטול שינוי
      description: 'יוצר טיוטת-ביטול (ChangeSet הפוך) שמחזירה את הקטלוג לגרסת-הבסיס של שינוי שכבר בוצע. לא משנה דבר — כמו preview. לביצוע הביטול קרא apply עם ה-id שחזר (אחרי אישור המשתמש).'
      parameters:
        - name: id
          in: path
          required: true
          description: ה-id של ה-ChangeSet שבוצע ושרוצים לבטל
          schema: { type: string }
      responses:
        "201":
          description: ChangeSet של ביטול (טיוטה)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChangeSet" }
        "409":
          description: אין מה לבטל (nothing_to_revert)

  /api/prices/export-link:
    post:
      operationId: createExportLink
      summary: קישור הורדה ל-Excel
      description: מחזיר קישור קצר-מועד (5 דק') להורדת קובץ ה-Excel המרכזי של הגרסה הפעילה.
      responses:
        "200":
          description: קישור הורדה
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }
                  expiresAt: { type: string, format: date-time }

  /api/prices/imports/preview:
    post:
      operationId: previewImport
      summary: תצוגה מקדימה של ייבוא מחירון
      description: 'התאמת שורות מחירון (שחילצת מהקובץ) מול הקטלוג → שונה/חדש/נעלם/לא-ודאי. לא שומר; מחזיר changeSetId+counts+changes+review. status: ready / no_confident_changes / unknown_supplier / ambiguous_supplier. baseVersion מ-getCatalogVersion; אשר עם applyChange.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseVersion, rows]
              properties:
                baseVersion: { type: integer, description: 'גרסת הבסיס (מ-getCatalogVersion)' }
                supplierId: { type: string, description: 'מזהה ספק (עדיף)' }
                supplierName: { type: string, description: 'שם ספק אם אין id' }
                detectMissing: { type: boolean, description: 'הצע השבתת מוצרים שנעלמו מהמחירון (ברירת מחדל false)' }
                excludeRowIds: { type: array, items: { type: string }, description: 'rowIds לדלג עליהם (אחרי דחיית המשתמש)' }
                excludeProductIds: { type: array, items: { type: string } }
                rows:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items: { $ref: "#/components/schemas/ImportRow" }
      responses:
        "200":
          description: 'ללא ChangeSet — unknown_supplier / ambiguous_supplier / no_confident_changes'
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportPreviewResponse" }
        "201":
          description: 'ChangeSet ייבוא נוצר (status=ready) — אשר עם applyChange'
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportPreviewResponse" }
        "409":
          description: התנגשות גרסה (stale_version) — קרא version שוב ועשה preview מחדש

  /api/insights/summary:
    get:
      operationId: getInsightsSummary
      summary: "סיכום הזמנות והוצאות"
      description: 'סיכום הוצאות/כמויות הזמנות בטווח זמן, עם פילוח לפי ספק/סניף/חודש/יום (groupBy). period (this_month/last_month/last_30d/this_quarter/ytd/all וכו׳) או from+to (YYYY-MM-DD). סכומים לפני מע"מ (spendWithVat=×1.17). סינון אופציונלי: branchCode/supplier. מחזיר totals+groups ממוינים.'
      parameters:
        - { name: period, in: query, schema: { type: string, enum: [today, yesterday, this_week, last_week, this_month, last_month, last_30d, last_90d, this_quarter, last_quarter, ytd, all] } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: groupBy, in: query, schema: { type: string, enum: [none, supplier, branch, month, weekday] } }
        - { name: branchCode, in: query, schema: { type: string } }
        - { name: supplier, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer } }
      responses:
        "200":
          description: "סיכום"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsightsSummary" }
  /api/insights/top-products:
    get:
      operationId: getTopProducts
      summary: "מוצרים מובילים"
      description: 'המוצרים המובילים בהזמנות בטווח זמן, לפי כמות (by=quantity) או כסף (by=spend). period או from+to; סינון אופציונלי branchCode/supplier; limit (ברירת מחדל 10, מקס׳ 50). סכומים לפני מע"מ. מחזיר שם/ספק/כמות/סכום/מס׳ הזמנות.'
      parameters:
        - { name: period, in: query, schema: { type: string, enum: [today, yesterday, this_week, last_week, this_month, last_month, last_30d, last_90d, this_quarter, last_quarter, ytd, all] } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: by, in: query, schema: { type: string, enum: [quantity, spend] } }
        - { name: branchCode, in: query, schema: { type: string } }
        - { name: supplier, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer } }
      responses:
        "200":
          description: "מוצרים מובילים"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TopProducts" }
  /api/insights/overview:
    get:
      operationId: getInsightsOverview
      summary: "תמונת מצב הזמנות"
      description: 'תמונת מצב עכשווית של ההזמנות: ממתינות, סכומי היום/השבוע/החודש, פירוט לכל סניף (הזמנה אחרונה + ממתינות + הוצאת החודש), וספקים מובילים החודש. סכומים לפני מע"מ. בלי פרמטרים.'
      responses:
        "200":
          description: "תמונת מצב"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InsightsOverview" }

components:
  securitySchemes:
    GptApiKey:
      type: http
      scheme: bearer
      description: PRICE_GPT_TOKEN — טוקן הכתיבה הייעודי של ה-GPT (Bearer)
  schemas:
    Supplier:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        aliases: { type: array, items: { type: string } }
        active: { type: boolean }
        pricesExcludeVat: { type: boolean }
        lastPriceListAt: { type: string }
    Product:
      type: object
      description: 'מוצר בקטלוג. מחירים לפני מע"מ.'
      properties:
        id: { type: string }
        supplierId: { type: string }
        supplierSku: { type: string }
        name: { type: string }
        normalizedName: { type: string }
        category: { type: string }
        packagePrice: { type: number, description: 'מחיר האריזה לפני מע"מ' }
        packageQuantity: { type: number, description: כמות יחידות באריזה }
        unit: { type: string, enum: [unit, kg, liter, roll, pack] }
        unitPrice: { type: number, description: packagePrice/packageQuantity }
        effectiveFrom: { type: string }
        active: { type: boolean }
        adminOnly: { type: boolean, description: מוסתר מהסניפים }
        updatedAt: { type: string }
    ProductPatch:
      type: object
      description: השדות לעדכון במוצר (חלקי). לשינוי מחיר — packagePrice בלבד.
      properties:
        packagePrice: { type: number }
        packageQuantity: { type: number }
        unit: { type: string, enum: [unit, kg, liter, roll, pack] }
        name: { type: string }
        category: { type: string }
        active: { type: boolean }
        adminOnly: { type: boolean }
        effectiveFrom: { type: string }
    ChangeOperation:
      type: object
      description: 'פעולת-שינוי אחת. הנפוץ: updateProduct (שינוי מחיר). deactivateProduct מסיר מוצר מהפעילים (במקום מחיקה). addProduct/addSupplier להוספה.'
      required: [type]
      properties:
        type:
          type: string
          enum: [updateProduct, deactivateProduct, addProduct, addSupplier]
        productId:
          type: string
          description: ל-updateProduct/deactivateProduct
        patch:
          $ref: "#/components/schemas/ProductPatch"
        product:
          type: object
          description: ל-addProduct — CatalogProduct מלא
        supplier:
          type: object
          description: ל-addSupplier — CatalogSupplier מלא
    ChangeSet:
      type: object
      properties:
        id: { type: string }
        baseVersion: { type: integer }
        source: { type: string }
        operations: { type: array, items: { $ref: "#/components/schemas/ChangeOperation" } }
        warnings:
          type: array
          items: { type: string }
          description: אזהרות (למשל שינוי מחיר חריג). הצג למשתמש לפני apply.
        status: { type: string }
        expiresAt: { type: string, format: date-time }
    ApplyResult:
      type: object
      description: תוצאת apply (קלה) — הגרסה החדשה והמוצרים שהשתנו בלבד (לא כל הקטלוג).
      properties:
        version: { type: integer, description: מספר הגרסה החדשה שנוצרה }
        previousVersion: { type: integer }
        changeSetId: { type: string }
        createdAt: { type: string, format: date-time }
        checksum: { type: string }
        changed:
          type: array
          description: המוצרים שהושפעו מהשינוי
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              supplierId: { type: string }
              packagePrice: { type: number }
              active: { type: boolean }

    ImportRow:
      type: object
      description: 'שורת מחירון שחילצת מהקובץ. מחיר לפני מע"מ.'
      required: [rowId, name, packagePrice]
      properties:
        rowId: { type: string, description: 'מזהה שורה ייחודי שאתה מקצה (ל-review/exclude)' }
        name: { type: string }
        supplierSku: { type: string }
        packagePrice: { type: number, description: 'מחיר אריזה לפני מע"מ' }
        packageQuantity: { type: number }
        unit: { type: string, enum: [unit, kg, liter, roll, pack] }
        category: { type: string }
    ImportPreviewResponse:
      type: object
      description: 'סיכום התאמת ייבוא. changeSetId קיים רק כש-status=ready. changes אינו כולל שורות ללא-שינוי.'
      properties:
        status: { type: string, enum: [ready, no_confident_changes, unknown_supplier, ambiguous_supplier] }
        supplier:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        candidates:
          type: array
          description: 'מועמדי ספק כש-status=ambiguous_supplier'
          items:
            type: object
            properties: { id: { type: string }, name: { type: string } }
        baseVersion: { type: integer }
        changeSetId: { type: string, description: 'ל-applyChange (רק כש-ready)' }
        expiresAt: { type: string, format: date-time }
        warnings: { type: array, items: { type: string } }
        counts:
          type: object
          properties:
            unchanged: { type: integer }
            changed: { type: integer }
            new: { type: integer }
            missing: { type: integer }
            uncertain: { type: integer }
            invalid: { type: integer }
            total: { type: integer }
        changes:
          type: array
          description: 'פעולות בטוחות (שונה/חדש/נעלם), ללא unchanged'
          items:
            type: object
            properties:
              rowId: { type: string }
              productId: { type: string }
              name: { type: string }
              matchType: { type: string, enum: [unchanged, changed, new, missing] }
              from: { type: number }
              to: { type: number }
              pct: { type: number }
        review:
          type: array
          description: 'שורות לא-ודאיות/לא-תקינות — הצג למשתמש, אל תאשר בלי הכרעה'
          items:
            type: object
            properties:
              rowId: { type: string }
              name: { type: string }
              reason: { type: string }
              candidates:
                type: array
                items:
                  type: object
                  properties: { id: { type: string }, name: { type: string }, price: { type: number } }
        truncated:
          type: object
          properties: { changes: { type: integer }, review: { type: integer } }

    InsightsSummary:
      type: object
      properties:
        range: { type: object, properties: { from: { type: string }, to: { type: string }, label: { type: string } } }
        groupBy: { type: string }
        filters: { type: object, properties: { branchCode: { type: string }, supplier: { type: string } } }
        totals: { type: object, properties: { spendExVat: { type: number }, spendWithVat: { type: number }, orders: { type: integer }, units: { type: number } } }
        groups:
          type: array
          items:
            type: object
            properties: { key: { type: string }, label: { type: string }, spendExVat: { type: number }, spendWithVat: { type: number }, orders: { type: integer }, units: { type: number } }
        note: { type: string }
    TopProducts:
      type: object
      properties:
        range: { type: object, properties: { from: { type: string }, to: { type: string }, label: { type: string } } }
        by: { type: string }
        products:
          type: array
          items:
            type: object
            properties: { productId: { type: string }, name: { type: string }, supplier: { type: string }, units: { type: number }, spendExVat: { type: number }, orders: { type: integer } }
        note: { type: string }
    InsightsOverview:
      type: object
      properties:
        now: { type: string }
        pending: { type: object, properties: { orders: { type: integer }, spendExVat: { type: number } } }
        today: { type: object, properties: { orders: { type: integer }, spendExVat: { type: number } } }
        thisWeek: { type: object, properties: { orders: { type: integer }, spendExVat: { type: number } } }
        thisMonth: { type: object, properties: { orders: { type: integer }, spendExVat: { type: number } } }
        branches:
          type: array
          items:
            type: object
            properties: { branchCode: { type: string }, branch: { type: string }, lastOrderAt: { type: string }, pendingOrders: { type: integer }, thisMonthSpendExVat: { type: number } }
        topSuppliersThisMonth:
          type: array
          items:
            type: object
            properties: { supplier: { type: string }, spendExVat: { type: number } }
